<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konterfei</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --surface: #111;
  --text: rgba(255,255,255,0.5);
  --accent: rgba(255,255,255,0.12);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Header ─────────────────────────────────────────────── */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  z-index: 100;
  background: linear-gradient(to bottom, var(--bg), transparent);
}

#title {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
}

#page-info {
  font-size: 11px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.25);
  font-variant-numeric: tabular-nums;
}

/* ── Progress bar ────────────────────────────────────────── */
#progress-bar {
  position: fixed;
  top: 0; left: 0;
  height: 1px;
  background: rgba(255,255,255,0.3);
  width: 0%;
  z-index: 101;
  transition: width 0.1s;
}

/* ── Scroll container ────────────────────────────────────── */
#scroll-container {
  flex: 1;
  overflow-y: scroll;
  overflow-x: hidden;
  scroll-behavior: smooth;
  padding: 64px 0 80px;
  -webkit-overflow-scrolling: touch;
}

#scroll-container::-webkit-scrollbar { width: 3px; }
#scroll-container::-webkit-scrollbar-track { background: transparent; }
#scroll-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* ── Pages ───────────────────────────────────────────────── */
#pages {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.page-wrapper {
  position: relative;
  width: 100%;
  max-width: 680px;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}

.page-wrapper.visible {
  opacity: 1;
  transform: translateY(0);
}

.page-wrapper canvas {
  display: block;
  width: 100% !important;
  height: auto !important;
  background: #fff;
}

/* ── Loader ──────────────────────────────────────────────── */
#loader {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 200;
  transition: opacity 0.8s;
}

#loader-title {
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
}

#loader-track {
  width: 140px;
  height: 1px;
  background: rgba(255,255,255,0.08);
}

#loader-fill {
  height: 1px;
  background: rgba(255,255,255,0.35);
  width: 0%;
  transition: width 0.15s;
}

#loader-pages {
  font-size: 10px;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.2);
}

/* ── Footer nav ──────────────────────────────────────────── */
#footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  background: linear-gradient(to top, var(--bg), transparent);
  z-index: 100;
}

.nav-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.3);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 8px 16px;
  transition: color 0.2s;
}
.nav-btn:hover { color: rgba(255,255,255,0.7); }

#page-input {
  background: none;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.4);
  font-size: 11px;
  font-family: inherit;
  width: 48px;
  text-align: center;
  padding: 4px 0;
  outline: none;
}
#page-input:focus { border-bottom-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.7); }
</style>
</head>
<body>

<div id="progress-bar"></div>

<div id="header">
  <div id="title">Konterfei</div>
  <div id="page-info">— / —</div>
</div>

<div id="scroll-container">
  <div id="pages"></div>
</div>

<div id="footer">
  <button class="nav-btn" id="btn-prev">← Prev</button>
  <input type="number" id="page-input" min="1" placeholder="—">
  <button class="nav-btn" id="btn-next">Next →</button>
</div>

<div id="loader">
  <div id="loader-title">Konterfei</div>
  <div id="loader-track"><div id="loader-fill"></div></div>
  <div id="loader-pages">Loading…</div>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── Config ────────────────────────────────────────────────
// PDF Dateiname – muss im gleichen Ordner wie index.html liegen
const PDF_FILE = 'konterfei.pdf';
const RENDER_SCALE = 2.0; // höher = schärfer, aber langsamer

// ── State ─────────────────────────────────────────────────
let pdfDoc = null;
let totalPages = 0;
let currentPage = 1;
const renderedPages = new Set();
const pageElements = [];

// ── Intersection Observer für lazy rendering ───────────────
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const wrapper = entry.target;
      wrapper.classList.add('visible');
      const pageNum = parseInt(wrapper.dataset.page);
      if (!renderedPages.has(pageNum)) renderPage(pageNum);
    }
  });
}, { rootMargin: '200px 0px', threshold: 0.01 });

// ── Load PDF ──────────────────────────────────────────────
async function loadPDF() {
  try {
    const loadingTask = pdfjsLib.getDocument({
      url: PDF_FILE,
      cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
      cMapPacked: true,
    });

    loadingTask.onProgress = (data) => {
      if (data.total) {
        const pct = Math.round(data.loaded / data.total * 100);
        document.getElementById('loader-fill').style.width = pct + '%';
        document.getElementById('loader-pages').textContent = `${pct}%`;
      }
    };

    pdfDoc = await loadingTask.promise;
    totalPages = pdfDoc.numPages;

    document.getElementById('loader-pages').textContent = `${totalPages} Seiten`;
    document.getElementById('page-input').max = totalPages;
    document.getElementById('page-input').placeholder = '1';

    buildPageStructure();

    const loader = document.getElementById('loader');
    loader.style.opacity = '0';
    setTimeout(() => loader.style.display = 'none', 800);

  } catch (err) {
    document.getElementById('loader-pages').textContent = 'PDF nicht gefunden';
    console.error('PDF load error:', err);
  }
}

// ── Build empty page slots ────────────────────────────────
async function buildPageStructure() {
  const container = document.getElementById('pages');

  // Get first page to know dimensions
  const firstPage = await pdfDoc.getPage(1);
  const viewport = firstPage.getViewport({ scale: 1 });
  const aspectRatio = viewport.height / viewport.width;

  for (let i = 1; i <= totalPages; i++) {
    const wrapper = document.createElement('div');
    wrapper.className = 'page-wrapper';
    wrapper.dataset.page = i;

    // Placeholder canvas with correct aspect ratio
    const canvas = document.createElement('canvas');
    canvas.style.aspectRatio = `${viewport.width} / ${viewport.height}`;
    wrapper.appendChild(canvas);
    container.appendChild(wrapper);
    pageElements[i] = wrapper;
    observer.observe(wrapper);
  }

  // Render first 3 pages immediately
  for (let i = 1; i <= Math.min(3, totalPages); i++) {
    pageElements[i].classList.add('visible');
    renderPage(i);
  }

  setupScrollTracking();
}

// ── Render single page ─────────────────────────────────────
async function renderPage(pageNum) {
  if (renderedPages.has(pageNum) || !pdfDoc) return;
  renderedPages.add(pageNum);

  try {
    const page = await pdfDoc.getPage(pageNum);
    const wrapper = pageElements[pageNum];
    const canvas = wrapper.querySelector('canvas');
    const ctx = canvas.getContext('2d');

    const containerWidth = Math.min(wrapper.clientWidth || 680, 680);
    const viewport = page.getViewport({ scale: 1 });
    const scale = (containerWidth / viewport.width) * RENDER_SCALE;
    const scaledViewport = page.getViewport({ scale });

    canvas.width = scaledViewport.width;
    canvas.height = scaledViewport.height;

    await page.render({ canvasContext: ctx, viewport: scaledViewport }).promise;
  } catch (err) {
    renderedPages.delete(pageNum);
    console.warn('Render error page', pageNum, err);
  }
}

// ── Scroll tracking ───────────────────────────────────────
function setupScrollTracking() {
  const scrollEl = document.getElementById('scroll-container');

  scrollEl.addEventListener('scroll', () => {
    const scrollTop = scrollEl.scrollTop;
    const scrollHeight = scrollEl.scrollHeight - scrollEl.clientHeight;
    const progress = scrollHeight > 0 ? scrollTop / scrollHeight : 0;

    // Progress bar
    document.getElementById('progress-bar').style.width = (progress * 100) + '%';

    // Current page detection
    for (let i = totalPages; i >= 1; i--) {
      const el = pageElements[i];
      if (!el) continue;
      if (el.offsetTop - 80 <= scrollTop) {
        currentPage = i;
        break;
      }
    }
    updatePageInfo();
  }, { passive: true });
}

function updatePageInfo() {
  document.getElementById('page-info').textContent = `${currentPage} / ${totalPages}`;
  document.getElementById('page-input').value = currentPage;
}

// ── Navigation ────────────────────────────────────────────
function goToPage(num) {
  const n = Math.max(1, Math.min(totalPages, num));
  const el = pageElements[n];
  if (!el) return;
  const scrollEl = document.getElementById('scroll-container');
  scrollEl.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' });
  currentPage = n;
  updatePageInfo();
}

document.getElementById('btn-prev').addEventListener('click', () => goToPage(currentPage - 1));
document.getElementById('btn-next').addEventListener('click', () => goToPage(currentPage + 1));

document.getElementById('page-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') goToPage(parseInt(e.target.value));
});

// Keyboard navigation
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goToPage(currentPage + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goToPage(currentPage - 1);
});

// ── Start ─────────────────────────────────────────────────
loadPDF();
</script>
</body>
</html>
